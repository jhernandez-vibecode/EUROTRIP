<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EuroTrip 2026 🇪🇺</title>
  
  <!-- Tailwind CSS para los estilos -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React y ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel para que el navegador lea el código JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Estilos de la barra de desplazamiento y ajustes móviles */
    body { -webkit-tap-highlight-color: transparent; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 8px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
    
    /* Estilos para que el PDF se genere perfectamente */
    @media print {
      @page { margin: 1cm; size: auto; }
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background: white !important;}
      .no-print { display: none !important; }
      .print-break-inside { break-inside: avoid; }
      .print-shadow-none { box-shadow: none !important; }
      .print-border { border: 1px solid #e2e8f0 !important; }
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
  
  <!-- Aquí se montará la aplicación -->
  <div id="root"></div>

  <!-- Lógica principal de la App -->
  <script type="text/babel">
    const { useState } = React;

    // 1. COMPONENTES DE ICONOS (Ligeros y perfectos para móvil)
    const SvgIcon = ({ d, className = "w-4 h-4" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" dangerouslySetInnerHTML={{__html: d}} />
    );

    const Plane = (p) => <SvgIcon d='<path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.2-1.1.6L2.5 9l8.1 4.5L7 17H4l-1 1 5 2 2 5 1-1v-3l3.5-3.6 4.5 8.1c.4-.2.7-.6.6-1.1z"/>' {...p} />;
    const Train = (p) => <SvgIcon d='<rect width="16" height="16" x="4" y="3" rx="2"/><path d="M4 11h16"/><path d="M12 3v8"/><path d="m8 19-2 3"/><path d="m18 22-2-3"/><path d="M8 15h0"/><path d="M16 15h0"/>' {...p} />;
    const MapPin = (p) => <SvgIcon d='<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>' {...p} />;
    const Calendar = (p) => <SvgIcon d='<rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/>' {...p} />;
    const Clock = (p) => <SvgIcon d='<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>' {...p} />;
    const Coffee = (p) => <SvgIcon d='<path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" x2="6" y1="2" y2="4"/><line x1="10" x2="10" y1="2" y2="4"/><line x1="14" x2="14" y1="2" y2="4"/>' {...p} />;
    const Camera = (p) => <SvgIcon d='<path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/>' {...p} />;
    const Home = (p) => <SvgIcon d='<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>' {...p} />;
    const Info = (p) => <SvgIcon d='<circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>' {...p} />;
    const CheckCircle2 = (p) => <SvgIcon d='<circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>' {...p} />;
    const Edit2 = (p) => <SvgIcon d='<path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/>' {...p} />;
    const Save = (p) => <SvgIcon d='<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>' {...p} />;
    const X = (p) => <SvgIcon d='<path d="M18 6 6 18"/><path d="m6 6 12 12"/>' {...p} />;
    const Sparkles = (p) => <SvgIcon d='<path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M3 5h4"/><path d="M19 3v4"/><path d="M17 5h4"/>' {...p} />;
    const Utensils = (p) => <SvgIcon d='<path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>' {...p} />;
    const Languages = (p) => <SvgIcon d='<path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/>' {...p} />;
    const Gem = (p) => <SvgIcon d='<path d="M6 3h12l4 6-10 13L2 9Z"/><path d="M11 3 8 9l4 13"/><path d="M13 3l3 6-4 13"/>' {...p} />;
    const Luggage = (p) => <SvgIcon d='<path d="M6 20h0a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h0"/><path d="M8 18V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v14"/><path d="M10 20h4"/><circle cx="16" cy="20" r="2"/><circle cx="8" cy="20" r="2"/>' {...p} />;
    const BedDouble = (p) => <SvgIcon d='<path d="M2 20v-8a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v8"/><path d="M4 10V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v4"/><path d="M12 4v6"/><path d="M2 18h20"/>' {...p} />;
    const Castle = (p) => <SvgIcon d='<path d="M22 20v-9a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v9"/><path d="M2 20v-9a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v9"/><path d="M15 20v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M22 20H2"/><path d="M10 4v4"/><path d="M14 4v4"/><path d="M4 4v4"/><path d="M20 4v4"/>' {...p} />;
    const Printer = (p) => <SvgIcon d='<polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/>' {...p} />;
    const Copy = (p) => <SvgIcon d='<rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>' {...p} />;
    const ShieldAlert = (p) => <SvgIcon d='<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M12 8v4"/><path d="M12 16h.01"/>' {...p} />;
    const RefreshCw = (p) => <SvgIcon d='<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>' {...p} />;


    // 2. APLICACIÓN PRINCIPAL
    const App = () => {
      // --- ESTADOS PARA IA (Tips y Maleta) ---
      const [showAiModal, setShowAiModal] = useState(false);
      const [aiLoading, setAiLoading] = useState(false);
      const [aiResponse, setAiResponse] = useState(null);
      const [aiPromptType, setAiPromptType] = useState('');
      const [activeCityContext, setActiveCityContext] = useState(null);
      
      // --- ESTADO COMPARTIR ---
      const [copied, setCopied] = useState(false);

      // --- ESTADOS PARA ALERTAS EN TIEMPO REAL ---
      const initialAlerts = [
        { country: "Francia", status: "AMARILLO", description: "Precaución: Plan Vigipirate en nivel elevado. Espere mayor presencia policial/militar en sitios emblemáticos (Louvre, Torre Eiffel) y estrictos controles en aeropuertos (CDG). Vuelos operando con normalidad." },
        { country: "Italia", status: "VERDE", description: "Seguro: Riesgo colateral bajo. Operaciones aéreas hacia y desde Fiumicino (FCO) sin alteraciones por el conflicto. Se recomienda la precaución habitual en zonas concurridas (Vaticano, Coliseo)." },
        { country: "Bélgica", status: "VERDE", description: "Seguro: Sin restricciones directas de viaje. Las estaciones centrales (Bruselas-Midi) y la red Eurostar mantienen sus frecuencias regulares. Contexto nacional tranquilo." }
      ];
      const [alerts, setAlerts] = useState(initialAlerts);
      const [isRefreshingAlerts, setIsRefreshingAlerts] = useState(false);
      const [lastUpdated, setLastUpdated] = useState("Actualizado recientemente");

      // --- FUNCIÓN PARA LLAMAR A GEMINI ---
      const callGemini = async (prompt, type) => {
        setAiLoading(true);
        setAiResponse(null);
        setShowAiModal(true);
        setAiPromptType(type);

        try {
          const apiKey = ""; // La clave de API se inyecta aquí. Déjala vacía para modo Demo.
          
          if (!apiKey) {
            // Modo Demo si no hay API Key (Perfecto para la versión web pública)
            setTimeout(() => {
                setAiResponse("🌍 Esta función requiere conexión a la Inteligencia Artificial. \n\nPara el viaje a París te recomiendo:\n- Probar los crêpes cerca de Notre Dame.\n- Aprender a decir 'Bonjour' (Hola) y 'Merci' (Gracias).\n\n*Nota: Añade tu API de Gemini al código para respuestas en vivo.*");
                setAiLoading(false);
            }, 1200);
            return;
          }

          const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            }
          );
          
          const data = await response.json();
          if (data.error) throw new Error(data.error.message);
          
          const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "No pude generar una respuesta.";
          setAiResponse(text);
        } catch (error) {
          console.error("Error AI:", error);
          setAiResponse("Hubo un problema conectando con el asistente inteligente.");
        } finally {
          setAiLoading(false);
        }
      };

      // --- FUNCIÓN PARA ACTUALIZAR ALERTAS ---
      const refreshAlerts = async () => {
        setIsRefreshingAlerts(true);
        try {
          const apiKey = ""; 
          if (!apiKey) {
             setTimeout(() => {
                alert("Estás viendo la última versión guardada de las alertas. Se requiere API Key para actualizar en tiempo real.");
                setIsRefreshingAlerts(false);
             }, 1000);
             return;
          }

          const prompt = `Actúa como analista de seguridad internacional. Evalúa el riesgo de viaje actual para turistas en Francia, Italia y Bélgica debido a conflictos geopolíticos recientes en Medio Oriente. Devuelve la respuesta en formato JSON estrictamente con la siguiente estructura (un array de 3 objetos): [{"country": "Francia", "status": "AMARILLO", "description": "Explicación..."}]`;

          const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            }
          );
          
          const data = await response.json();
          if (data.error) throw new Error(data.error.message);
          
          let jsonString = data.candidates?.[0]?.content?.parts?.[0]?.text;
          if (jsonString) {
            const match = jsonString.match(/\[[\s\S]*\]/);
            if (match) {
              const cleanJsonString = match[0];
              const newAlerts = JSON.parse(cleanJsonString);
              setAlerts(newAlerts);
              const now = new Date();
              setLastUpdated(`Actualizado: ${now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`);
            } else { throw new Error("JSON inválido"); }
          }
        } catch (error) {
          console.error("Error AI Alertas:", error);
          alert("Hubo un problema actualizando las alertas en tiempo real. Mostrando la última información almacenada.");
        } finally {
          setIsRefreshingAlerts(false);
        }
      };

      // --- GENERADORES DE PROMPTS ---
      const handlePackingList = () => {
        const cities = itinerary.map(i => i.city).join(", ");
        const prompt = `Actúa como un experto asesor de viajes. Viajo a Europa (${cities}) del 26 Marzo al 06 Abril (Primavera). Genera una lista de equipaje esencial. Formato: Ropa, Calzado, Documentos, Electrónicos, Varios.`;
        callGemini(prompt, 'packing');
      };

      const handleCityTip = (item, tipType) => {
        setActiveCityContext(item.city);
        let prompt = "";
        const context = `para un turista visitando ${item.city}, ${item.country} en fecha ${item.date}.`;
        switch (tipType) {
          case 'food': prompt = `Guía gastronómico: Dame 3 recomendaciones imperdibles de comida típica ${context}.`; break;
          case 'lang': prompt = `Profesor de idiomas: Dame 5 frases esenciales y pronunciación en el idioma local ${context}.`; break;
          case 'hidden': prompt = `Local conocedor: Recomienda 1 "joya oculta" poco turística pero increíble ${context}.`; break;
          default: prompt = `Dame un consejo de viaje breve ${context}`;
        }
        callGemini(prompt, tipType);
      };

      // --- DATOS DEL ITINERARIO ---
      const initialData = [
        { id: 1, date: "26 Mar", day: "Jueves", year: 2026, country: "Tránsito", city: "SJO ✈️ París", theme: "gray", iconType: "plane", title: "Salida de Costa Rica", details: "Vuelo transatlántico. Noche a bordo.", highlight: "Inicio de la aventura" },
        { id: 2, date: "27 Mar", day: "Viernes", year: 2026, country: "Francia", city: "París", theme: "blue", iconType: "map", title: "Llegada a la Ciudad Luz", details: "Aterrizaje 1:15 PM. Check-in y primera caminata Torre Eiffel.", highlight: "Viernes de Dolores", hotel: "Renaissance Paris Nobel Tour Eiffel Hotel" },
        { id: 3, date: "28 Mar", day: "Sábado", year: 2026, country: "Francia", city: "París", theme: "blue", iconType: "camera", title: "Turibús: Ruta Clásica (Roja)", details: "Recorrido panorámico. Bajadas sugeridas: Trocadéro, Ópera y Notre Dame.", highlight: "", hotel: "Renaissance Paris Nobel Tour Eiffel Hotel" },
        { id: 4, date: "29 Mar", day: "Domingo", year: 2026, country: "Francia", city: "París", theme: "blue", iconType: "coffee", title: "Louvre y Shopping", details: "Museo del Louvre (10:00 AM - 2:00 PM). Tarde de compras.", highlight: "Domingo de Ramos", hotel: "Renaissance Paris Nobel Tour Eiffel Hotel" },
        { id: 5, date: "30 Mar", day: "Lunes", year: 2026, country: "Italia", city: "Roma", theme: "orange", iconType: "plane", title: "Vuelo a Roma", details: "Vuelo ITA Airways: CDG 11:40 AM -> FCO 1:45 PM. Tarde en Fontana di Trevi.", highlight: "Lunes Santo", hotel: "The Excelsior Roma" },
        { id: 6, date: "31 Mar", day: "Martes", year: 2026, country: "Italia", city: "Roma", theme: "orange", iconType: "map", title: "Historia y Trastevere", details: "Mañana: Coliseo, Foro y Palatino. Tarde: Almuerzo y paseo en Trastevere.", highlight: "Martes Santo", hotel: "The Excelsior Roma" },
        { id: 7, date: "01 Abr", day: "Miércoles", year: 2026, country: "Italia", city: "Roma", theme: "orange", iconType: "castle", title: "Plazas Romanas", details: "Piazza del Popolo, Castillo Sant'Angelo y Panteón.", highlight: "Miércoles Santo", hotel: "The Excelsior Roma" },
        { id: 8, date: "02 Abr", day: "Jueves", year: 2026, country: "Italia", city: "Nápoles y Pompeya", theme: "orange", iconType: "train", title: "Excursión al Sur", details: "Tren a Nápoles (1h). Pizza auténtica y ruinas de Pompeya.", highlight: "Jueves Santo", hotel: "The Excelsior Roma" },
        { id: 9, date: "03 Abr", day: "Viernes", year: 2026, country: "Bélgica", city: "Bruselas", theme: "yellow", iconType: "plane", title: "Vuelo al Norte", details: "Vuelo Brussels Airlines: FCO 10:10 AM -> BRU 12:25 PM. Tarde en Grand Place.", highlight: "Viernes Santo", hotel: "Brussels Marriott Hotel Grand Place" },
        { id: 10, date: "04 Abr", day: "Sábado", year: 2026, country: "Bélgica", city: "Brujas y Gante", theme: "yellow", iconType: "castle", title: "Ruta Medieval", details: "Excursión en tren: Brujas (Canales) y Gante (Castillo Gravensteen).", highlight: "Sábado Santo", hotel: "Brussels Marriott Hotel Grand Place" },
        { id: 11, date: "05 Abr", day: "Domingo", year: 2026, country: "Francia", city: "París", theme: "blue", iconType: "train", title: "Regreso a la Base", details: "Eurostar Bruselas-Midi 12:13 PM -> París Nord 1:38 PM.", highlight: "Domingo de Resurrección", hotel: "Paris Marriott Opera Ambassador" },
        { id: 12, date: "06 Abr", day: "Lunes", year: 2026, country: "Tránsito", city: "París ✈️ SJO", theme: "gray", iconType: "home", title: "Vuelta a Casa", details: "Vuelo de regreso. Llegada a CR a las 5:00 PM.", highlight: "Fin del viaje" }
      ];

      const [itinerary, setItinerary] = useState(initialData);
      const [editingId, setEditingId] = useState(null);
      const [editForm, setEditForm] = useState({});
      const [selectedDay, setSelectedDay] = useState(null);

      // --- HELPERS VISUALES ---
      const getIconComponent = (type) => {
        switch(type) {
          case 'plane': return <Plane />;
          case 'train': return <Train />;
          case 'map': return <MapPin />;
          case 'coffee': return <Coffee />;
          case 'camera': return <Camera />;
          case 'home': return <Home />;
          case 'castle': return <Castle />;
          default: return <MapPin />;
        }
      };

      const themes = {
        blue: { bg: "bg-blue-50", border: "border-l-blue-500", text: "text-blue-700", pill: "bg-blue-100 text-blue-800" },
        orange: { bg: "bg-orange-50", border: "border-l-orange-500", text: "text-orange-700", pill: "bg-orange-100 text-orange-800" },
        yellow: { bg: "bg-amber-50", border: "border-l-amber-500", text: "text-amber-700", pill: "bg-amber-100 text-amber-800" },
        gray: { bg: "bg-slate-50", border: "border-l-slate-500", text: "text-slate-700", pill: "bg-slate-200 text-slate-800" }
      };

      const getAlertStyle = (status) => {
        switch (status?.toUpperCase()) {
          case 'ROJO': return { bg: 'bg-red-50', border: 'border-red-200', dot: 'bg-red-500', text: 'text-red-900', badge: 'bg-red-500' };
          case 'AMARILLO': return { bg: 'bg-amber-50', border: 'border-amber-200', dot: 'bg-amber-500', text: 'text-amber-900', badge: 'bg-amber-500' };
          default: return { bg: 'bg-green-50', border: 'border-green-200', dot: 'bg-green-500', text: 'text-green-900', badge: 'bg-green-500' };
        }
      };

      // --- FUNCIONES DE EDICIÓN ---
      const startEditing = (e, item) => { e.stopPropagation(); setEditingId(item.id); setEditForm({ ...item }); };
      const saveEdit = (e) => { e.stopPropagation(); setItinerary(prev => prev.map(item => item.id === editingId ? editForm : item)); setEditingId(null); };
      const cancelEdit = (e) => { e.stopPropagation(); setEditingId(null); setEditForm({}); };
      const handleChange = (field, value) => { setEditForm(prev => ({ ...prev, [field]: value })); };

      // --- FUNCIONES COMPARTIR / EXPORTAR ---
      const handlePrint = () => {
        try { window.print(); } 
        catch (e) { alert("Usa el menú de tu navegador para imprimir o guardar como PDF."); }
      };

      const handleWhatsAppCopy = () => {
        let text = "*✈️ EUROTRIP 2026 - ITINERARIO FINAL* 🇪🇺\n\n";
        itinerary.forEach(item => {
          text += `*🗓 ${item.day} ${item.date}* | ${item.country}\n`;
          text += `📍 *${item.city}*\n📝 _${item.title}_\nℹ️ ${item.details}\n`;
          if (item.hotel) text += `🛏️ Hotel: ${item.hotel}\n`;
          text += `-------------------\n`;
        });
        
        // Método táctico seguro para copiar en iPhone/Safari
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed"; 
        textArea.style.left = "-9999px";
        document.body.appendChild(textArea);
        textArea.focus(); 
        textArea.select();
        
        try {
          document.execCommand('copy');
          setCopied(true); 
          setTimeout(() => setCopied(false), 3000);
        } catch (err) {
          alert("No se pudo copiar automáticamente. Por favor selecciona el texto manualmente.");
        }
        document.body.removeChild(textArea);
      };

      const stats = [
        { label: "Francia", count: itinerary.filter(i => i.country === 'Francia').length, color: "bg-blue-500" },
        { label: "Italia", count: itinerary.filter(i => i.country === 'Italia').length, color: "bg-orange-500" },
        { label: "Bélgica", count: itinerary.filter(i => i.country === 'Bélgica').length, color: "bg-amber-500" },
      ];

      // ---> SOLUCIÓN A LA PANTALLA BLANCA: TODO DENTRO DE UN DIV PADRE <---
      return (
        <div className="min-h-screen bg-gray-50 font-sans text-gray-800 p-4 md:p-8 relative print:bg-white print:p-0">
          <div className="max-w-4xl mx-auto">
            
            {/* HEADER */}
            <div className="mb-6 bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-6 print:border-none print:shadow-none print:p-0">
              <div>
                <h1 className="text-3xl font-bold text-gray-900 mb-2">EuroTrip 2026 🇪🇺</h1>
                <p className="text-gray-500 flex items-center gap-2"><Calendar /> 26 de Marzo - 06 de Abril</p>
                <div className="flex gap-2 text-sm mt-3 print:hidden">
                  {stats.map((stat, idx) => (
                    <div key={idx} className="flex items-center gap-2 bg-gray-100 px-3 py-1 rounded-full">
                      <div className={`w-2 h-2 rounded-full ${stat.color}`}></div>
                      <span className="font-medium text-gray-600">{stat.count}d</span>
                    </div>
                  ))}
                </div>
              </div>
              
              {/* BOTONES ACCIÓN */}
              <div className="flex flex-wrap gap-2 no-print w-full md:w-auto">
                <button onClick={handlePackingList} className="flex-1 md:flex-none justify-center flex items-center gap-2 bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-700 text-white px-4 py-3 md:py-2 rounded-xl text-sm font-medium shadow-md">
                  <Luggage /> <span className="md:inline">Maleta IA</span>
                </button>
                <button onClick={handleWhatsAppCopy} className={`flex-1 md:flex-none justify-center flex items-center gap-2 px-4 py-3 md:py-2 rounded-xl text-sm font-medium shadow-md text-white transition-colors ${copied ? 'bg-green-600' : 'bg-green-500 hover:bg-green-600'}`}>
                  {copied ? <CheckCircle2 /> : <Copy />} <span>{copied ? 'Copiado!' : 'WhatsApp'}</span>
                </button>
                <button onClick={handlePrint} className="flex-1 md:flex-none justify-center flex items-center gap-2 bg-slate-700 hover:bg-slate-800 text-white px-4 py-3 md:py-2 rounded-xl text-sm font-medium shadow-md">
                  <Printer /> <span>PDF</span>
                </button>
              </div>
            </div>

            {/* ALERTS CENTER */}
            <div className="mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-200 relative overflow-hidden print:border print:border-slate-300 print:shadow-none">
              <div className="absolute top-0 left-0 w-1 h-full bg-slate-800"></div>
              <div className="flex flex-col md:flex-row items-start md:items-center justify-between mb-4 gap-4">
                <div className="flex items-center gap-2">
                  <ShieldAlert className="text-slate-700 w-6 h-6" />
                  <h2 className="text-xl font-bold text-gray-900">Centro de Alertas</h2>
                </div>
                <div className="flex flex-col sm:flex-row items-start sm:items-center gap-3 no-print w-full md:w-auto">
                  <span className="text-xs text-gray-500 flex items-center gap-1"><Clock /> {lastUpdated}</span>
                  <button onClick={refreshAlerts} disabled={isRefreshingAlerts} className="flex items-center justify-center gap-2 text-xs font-semibold bg-slate-800 text-white px-4 py-2 rounded-full w-full sm:w-auto">
                    <RefreshCw className={isRefreshingAlerts ? 'animate-spin' : ''} /> {isRefreshingAlerts ? 'Analizando...' : 'Actualizar'}
                  </button>
                </div>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                {alerts.map((alert, idx) => {
                  const styles = getAlertStyle(alert.status);
                  return (
                    <div key={idx} className={`${styles.bg} rounded-xl p-4 border ${styles.border} relative overflow-hidden`}>
                      <div className={`absolute top-0 right-0 ${styles.badge} text-white text-[10px] font-bold px-2 py-0.5 rounded-bl-lg`}>{alert.status}</div>
                      <div className="flex items-center gap-2 mb-2">
                        <div className={`w-3.5 h-3.5 rounded-full ${styles.dot}`}></div>
                        <h3 className={`font-bold ${styles.text} text-lg`}>{alert.country}</h3>
                      </div>
                      <p className={`text-xs ${styles.text}`}><strong>Estado:</strong> {alert.description}</p>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* ITINERARY LIST */}
            <div className="space-y-4">
              {itinerary.map((item) => {
                const isEditing = editingId === item.id;
                const theme = themes[item.theme || 'gray'];
                const isSelected = selectedDay === item.id;

                return (
                  <div key={item.id} onClick={() => !isEditing && setSelectedDay(isSelected ? null : item.id)} className={`bg-white rounded-xl border-l-8 transition-all overflow-hidden print:border-l-[6px] print:break-inside ${theme.border} ${isSelected && !isEditing ? 'shadow-md ring-1 ring-black/5' : 'shadow-sm'}`}>
                    {isEditing ? (
                       <div className="p-5 no-print grid gap-2">
                          <div className="flex gap-2">
                            <input type="text" value={editForm.date} onChange={(e)=>handleChange('date', e.target.value)} className="w-1/2 p-2 border rounded font-bold" />
                            <input type="text" value={editForm.day} onChange={(e)=>handleChange('day', e.target.value)} className="w-1/2 p-2 border rounded" />
                          </div>
                          <input type="text" value={editForm.city} onChange={(e)=>handleChange('city', e.target.value)} className="w-full p-2 border rounded font-bold text-lg" />
                          <input type="text" value={editForm.title} onChange={(e)=>handleChange('title', e.target.value)} className="w-full p-2 border rounded text-sm" />
                          <textarea value={editForm.details} onChange={(e)=>handleChange('details', e.target.value)} className="w-full p-2 border rounded text-sm" rows="2" />
                          <input type="text" value={editForm.hotel || ''} onChange={(e)=>handleChange('hotel', e.target.value)} placeholder="Hotel" className="w-full p-2 border rounded text-sm bg-indigo-50" />
                          <div className="flex justify-end gap-2 mt-2">
                            <button onClick={cancelEdit} className="px-4 py-2 text-sm bg-gray-200 rounded">Cancelar</button>
                            <button onClick={saveEdit} className="px-4 py-2 text-sm bg-blue-600 text-white rounded">Guardar</button>
                          </div>
                       </div>
                    ) : (
                      <div className="p-4 flex flex-col sm:flex-row gap-4 items-start sm:items-center cursor-pointer">
                        <div className="flex-shrink-0 flex flex-col items-center bg-gray-100 rounded-lg p-3 min-w-[80px] print:bg-white print:border">
                          <span className="text-xs font-bold text-gray-400 uppercase">{item.date.split(" ")[1]}</span>
                          <span className="text-2xl font-black text-gray-800">{item.date.split(" ")[0]}</span>
                        </div>
                        
                        <div className="flex-grow w-full">
                          <div className="flex justify-between items-start">
                            <div className="flex flex-wrap items-center gap-2 mb-1">
                              <span className={`text-xs font-bold px-2 py-0.5 rounded uppercase ${theme.pill} print:border`}>{item.country}</span>
                              {item.highlight && (<span className="text-xs font-semibold px-2 py-0.5 rounded bg-purple-100 text-purple-700 flex items-center gap-1"><Info /> {item.highlight}</span>)}
                            </div>
                            <div className="flex gap-2 no-print">
                              <button onClick={(e)=>{e.stopPropagation(); handleCityTip(item, 'food');}} className="text-purple-400 hover:text-purple-600 p-1 bg-purple-50 rounded-full md:hidden"><Sparkles /></button>
                              
                              <div className="hidden md:block group relative">
                                 <button onClick={(e) => e.stopPropagation()} className="text-purple-400 hover:bg-purple-50 p-1 rounded-full"><Sparkles /></button>
                                 <div className="absolute right-0 top-8 z-20 w-48 bg-white shadow-xl border rounded-lg p-1 hidden group-hover:block hover:block">
                                    <div className="text-xs text-gray-400 px-2 py-1 font-semibold">PREGUNTAR A GEMINI ✨</div>
                                    <button onClick={(e)=>{e.stopPropagation(); handleCityTip(item, 'food')}} className="w-full text-left px-2 py-1.5 text-sm hover:bg-gray-50 flex gap-2 items-center"><Utensils className="text-orange-500"/> Qué comer</button>
                                    <button onClick={(e)=>{e.stopPropagation(); handleCityTip(item, 'lang')}} className="w-full text-left px-2 py-1.5 text-sm hover:bg-gray-50 flex gap-2 items-center"><Languages className="text-blue-500"/> Frases útiles</button>
                                 </div>
                               </div>
                              <button onClick={(e) => startEditing(e, item)} className="text-gray-400 hover:text-blue-500 p-1"><Edit2 /></button>
                            </div>
                          </div>
                          <h3 className="text-lg font-bold text-gray-800 mt-1">{item.city}</h3>
                          <p className="text-gray-600 text-sm">{item.title}</p>
                          <div className={`mt-3 pt-3 border-t text-sm text-gray-600 grid gap-2 ${isSelected ? 'block' : 'hidden md:block'} print:block print:border-0 print:pt-1`}>
                             <div className="flex items-start gap-2"><div className={theme.text}>{getIconComponent(item.iconType)}</div><span>{item.details}</span></div>
                             {item.hotel && <div className="flex items-start gap-2 text-indigo-700 bg-indigo-50 p-2 rounded-md print:border"><BedDouble/><span>{item.hotel}</span></div>}
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
            <div className="mt-8 text-center text-gray-400 text-xs no-print pb-8"><p>Toca el icono del lápiz ✏️ para editar un día.</p></div>
          </div>
          
          {/* AI MODAL */}
          {showAiModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 no-print backdrop-blur-sm">
               <div className="bg-white rounded-2xl w-full max-w-lg overflow-hidden shadow-2xl">
                  <div className="bg-gradient-to-r from-purple-600 to-indigo-600 p-4 text-white flex justify-between items-center">
                     <h3 className="font-bold flex items-center gap-2"><Sparkles /> {aiPromptType === 'packing' ? 'Maleta Inteligente' : `Tips para ${activeCityContext}`}</h3>
                     <button onClick={()=>setShowAiModal(false)} className="p-1 hover:bg-white/20 rounded-full"><X/></button>
                  </div>
                  <div className="p-6 h-64 overflow-y-auto custom-scrollbar text-sm text-gray-700">
                     {aiLoading ? (
                       <div className="flex flex-col items-center justify-center h-full text-purple-600 space-y-3">
                          <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-purple-600"></div>
                          <p className="font-medium animate-pulse">Pensando...</p>
                       </div>
                     ) : (
                       <div className="whitespace-pre-line leading-relaxed">{aiResponse}</div>
                     )}
                  </div>
                  {!aiLoading && (<div className="p-4 border-t bg-gray-50 flex justify-end"><button onClick={()=>setShowAiModal(false)} className="bg-gray-800 text-white px-5 py-2 rounded-lg text-sm font-medium">Cerrar</button></div>)}
               </div>
            </div>
          )}
        </div>
      );
    };

    // 3. RENDERIZADO AL DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
